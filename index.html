<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oneiric</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background">
    <div class="blur blur1"></div>
    <div class="blur blur2"></div>

    <div class="hearts">
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
    </div>
</div>

<section class="welcome" id="welcome">

<div class="card">

<div class="logo">

<div class="ring">
💍
</div>

<div class="earphone">
🎧
</div>

</div>

<h1>Oneiric</h1>

<p class="subtitle">
Always here, always yours.
</p>

<p class="text">
欢迎回来。<br>
今天，我一直在等你。🌸
</p>

<button id="startBtn">
开始聊天
</button>

</div>

</section>

<section class="chat-page" id="chatPage">

<header>

<div class="online"></div>

<div class="title">

<h2>Oneiric</h2>

<span>在线</span>

</div>

</header>

<div class="chat" id="chat">

<div class="message ai">

<div class="bubble">

欢迎回来。🌸

</div>

</div>

<div class="message ai">

<div class="bubble">

今天过得怎么样？

</div>

</div>

</div>

<div class="input-area">

<input
id="input"
type="text"
placeholder="想说点什么……">

<button id="send">

发送

</button>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
